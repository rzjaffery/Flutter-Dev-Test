name: product_catalogue
description: "A new Flutter project for Zyne Ventures"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase core and services
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # State management
  provider: ^6.1.2

  # UI utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  firebase_storage: ^12.1.0

  # Form validation and utilities
  fluttertoast: ^8.2.8
  flutter_spinkit: ^5.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

